version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradingagents-app
    command: poetry run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=trading
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=traderpass
      - PROM_METRICS=true
    depends_on:
      - redis
      - postgres
      - prometheus

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradingagents-dashboard
    command: poetry run python -m tradingagents dashboard --host 0.0.0.0 --port 8000
    volumes:
      - ./:/app
    ports:
      - "8001:8000"
    environment:
      - DASHBOARD_API_KEY=demo-key-123
      - PROM_METRICS=true
    depends_on:
      - redis
      - prometheus

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: tradingagents-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.4.0
    container_name: tradingagents-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  redis:
    image: redis:7.2-alpine
    container_name: tradingagents-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: tradingagents-postgres
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: traderpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: 
  prometheus_data:
  grafana_data: 